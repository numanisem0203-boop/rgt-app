<!DOCTYPE html>
<html lang="tr" data-theme="siyah-gri"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>RGT App</title>

<style>
/* ═══════════════════════════════════════
   TEMALAR
═══════════════════════════════════════ */
:root {
  --bg: #111110;
  --card-bg: #1a1916;
  --half-bg: #1f1d19;
  --item-bg: #252318;
  --item-done-bg: #1a1916;
  --accent: #e8823a;
  --accent-dim: #332e1a;
  --text-primary: #d4cfc8;
  --text-secondary: #888070;
  --text-done: #484540;
  --border: rgba(255,255,255,0.06);
  --badge-bg: #332e1a;
  --badge-text: #e8823a;
  --header-text: #e8823a;
  --plus-bg: #252318;
  --divider: rgba(255,255,255,0.05);
  --modal-bg: #1a1916;
  --input-bg: #252318;
  --input-border: rgba(255,255,255,0.1);
  --shadow: rgba(0,0,0,0.5);
}
[data-theme="siyah-gri"] {
  --bg: #0a0a0a;
  --card-bg: #141414;
  --half-bg: #181818;
  --item-bg: #222222;
  --item-done-bg: #141414;
  --accent: #bbbbbb;
  --accent-dim: #2a2a2a;
  --text-primary: #dddddd;
  --text-secondary: #666666;
  --text-done: #333333;
  --border: rgba(255,255,255,0.05);
  --badge-bg: #2a2a2a;
  --badge-text: #aaaaaa;
  --header-text: #bbbbbb;
  --plus-bg: #222222;
  --divider: rgba(255,255,255,0.04);
  --modal-bg: #141414;
  --input-bg: #222222;
  --input-border: rgba(255,255,255,0.08);
  --shadow: rgba(0,0,0,0.6);
}
[data-theme="siyah-sari"] {
  --bg: #0d0d0d;
  --card-bg: #161400;
  --half-bg: #1a1800;
  --item-bg: #1e1c00;
  --item-done-bg: #161400;
  --accent: #f5d020;
  --accent-dim: #2e2c00;
  --text-primary: #e8e0b0;
  --text-secondary: #7a7040;
  --text-done: #3a3800;
  --border: rgba(255,220,0,0.06);
  --badge-bg: #2e2c00;
  --badge-text: #f5d020;
  --header-text: #f5d020;
  --plus-bg: #222000;
  --divider: rgba(255,220,0,0.05);
  --modal-bg: #161400;
  --input-bg: #1e1c00;
  --input-border: rgba(255,220,0,0.12);
  --shadow: rgba(0,0,0,0.6);
}
[data-theme="acik-krem"] {
  --bg: #f5f0e8;
  --card-bg: #ffffff;
  --half-bg: #faf8f4;
  --item-bg: #f3efe8;
  --item-done-bg: #faf8f4;
  --accent: #5a5040;
  --accent-dim: #e8e0d0;
  --text-primary: #1a1510;
  --text-secondary: #8a8070;
  --text-done: #bbb0a0;
  --border: rgba(0,0,0,0.08);
  --badge-bg: #e8e0d0;
  --badge-text: #5a5040;
  --header-text: #2a2520;
  --plus-bg: #ede8e0;
  --divider: rgba(0,0,0,0.06);
  --modal-bg: #ffffff;
  --input-bg: #f3efe8;
  --input-border: rgba(0,0,0,0.1);
  --shadow: rgba(0,0,0,0.15);
}
[data-theme="gri-beyaz"] {
  --bg: #e8e8e8;
  --card-bg: #f5f5f5;
  --half-bg: #efefef;
  --item-bg: #e8e8e8;
  --item-done-bg: #f5f5f5;
  --accent: #444444;
  --accent-dim: #d8d8d8;
  --text-primary: #111111;
  --text-secondary: #777777;
  --text-done: #aaaaaa;
  --border: rgba(0,0,0,0.09);
  --badge-bg: #d8d8d8;
  --badge-text: #444444;
  --header-text: #222222;
  --plus-bg: #e0e0e0;
  --divider: rgba(0,0,0,0.06);
  --modal-bg: #f5f5f5;
  --input-bg: #e8e8e8;
  --input-border: rgba(0,0,0,0.1);
  --shadow: rgba(0,0,0,0.15);
}
[data-theme="lacivert-cyan"] {
  --bg: #0b0f1a;
  --card-bg: #111827;
  --half-bg: #141e30;
  --item-bg: #1a2640;
  --item-done-bg: #111827;
  --accent: #4fc3f7;
  --accent-dim: #0d2040;
  --text-primary: #c5d8f0;
  --text-secondary: #4a6a90;
  --text-done: #2a4060;
  --border: rgba(79,195,247,0.08);
  --badge-bg: #0d2040;
  --badge-text: #4fc3f7;
  --header-text: #4fc3f7;
  --plus-bg: #1a2640;
  --divider: rgba(79,195,247,0.05);
  --modal-bg: #111827;
  --input-bg: #1a2640;
  --input-border: rgba(79,195,247,0.12);
  --shadow: rgba(0,0,0,0.5);
}

/* ═══════════════════════════════════════
   GENEL
═══════════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text-primary);
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  overflow: hidden;
  user-select: none;
}

/* ═══════════════════════════════════════
   ANA LAYOUT
═══════════════════════════════════════ */
#app {
  height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
}

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
#header {
  padding: 16px 20px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
#date-display {
  display: flex;
  flex-direction: column;
}
#day-name {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 400;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
#date-full {
  font-size: 22px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}
#header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}
.header-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--item-bg);
  border: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: opacity 0.15s;
  font-size: 16px;
}
.header-btn:active { opacity: 0.6; }

/* ═══════════════════════════════════════
   GÜN GEZİNME
═══════════════════════════════════════ */
#day-nav {
  padding: 8px 20px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
#day-nav::-webkit-scrollbar { display: none; }
.day-chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  background: var(--item-bg);
  border: 0.5px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.day-chip.active {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
  font-weight: 600;
}
.day-chip:active { opacity: 0.7; }

/* ═══════════════════════════════════════
   KART ALANI - PEEK SWIPE
═══════════════════════════════════════ */
#cards-wrapper {
  flex: 1;
  overflow: hidden;
  position: relative;
  padding: 0 0 16px;
  /* Peek için: yanlarda kartın taşmasına izin veriyoruz */
}
/* Track'in yanlara taşması için wrapper'ın clip'ini kaldırıyoruz */
#cards-wrapper::before,
#cards-wrapper::after {
  content: '';
  position: absolute;
  top: 0; bottom: 16px;
  width: 24px;
  z-index: 2;
  pointer-events: none;
}
#cards-wrapper::before { left: 0; background: linear-gradient(to right, var(--bg), transparent); }
#cards-wrapper::after  { right: 0; background: linear-gradient(to left, var(--bg), transparent); }
#cards-track {
  display: flex;
  height: 100%;
  transition: transform 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  will-change: transform;
}
.day-card {
  flex-shrink: 0;
  /* Kart genişliği: ekranın %82'si, ortalanmış, yanlarda peek */
  width: calc(100% - 64px);
  margin: 0 8px;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--card-bg);
  border-radius: 26px;
  border: 0.5px solid var(--border);
  overflow: hidden;
  transition: transform 0.38s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              opacity 0.38s ease;
}
/* Aktif olmayan kartlar biraz küçülsün ve soluklaşsın */
.day-card:not(.active-card) {
  opacity: 0.55;
  transform: scale(0.96);
}

/* ═══════════════════════════════════════
   KART İÇİ - İKİ YARI
═══════════════════════════════════════ */
.card-half {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 14px 14px 10px;
  min-height: 0;
}
.card-half + .card-half {
  border-top: 0.5px solid var(--divider);
}
.half-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  flex-shrink: 0;
}
.half-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--header-text);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.add-btn {
  width: 26px;
  height: 26px;
  border-radius: 8px;
  background: var(--plus-bg);
  border: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  color: var(--accent);
  transition: opacity 0.15s;
}
.add-btn:active { opacity: 0.6; }

/* ═══════════════════════════════════════
   GÖREV LİSTESİ
═══════════════════════════════════════ */
.items-scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.items-scroll::-webkit-scrollbar { display: none; }

.task-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 10px;
  border-radius: 12px;
  background: var(--item-bg);
  border: 0.5px solid var(--border);
  margin-bottom: 6px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: opacity 0.2s;
  -webkit-user-select: none;
}
.task-item.done {
  background: var(--item-done-bg);
  opacity: 0.45;
}
.task-item.done .task-name {
  text-decoration: line-through;
  color: var(--text-done);
}

.task-time {
  font-size: 12px;
  font-weight: 700;
  padding: 4px 9px;
  border-radius: 8px;
  background: var(--badge-bg);
  color: var(--badge-text);
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.04em;
  font-variant-numeric: tabular-nums;
  border: 0.5px solid var(--accent);
  opacity: 0.95;
}
.task-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  flex: 1;
  line-height: 1.3;
}
.task-detail-btn {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  background: var(--half-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--text-secondary);
  flex-shrink: 0;
  border: 0.5px solid var(--border);
}

/* Swipe to complete çizgisi */
.swipe-line {
  position: absolute;
  top: 50%;
  left: 0;
  width: 0;
  height: 1.5px;
  background: var(--accent);
  transform: translateY(-50%);
  pointer-events: none;
  transition: width 0.25s ease;
}
.task-item.swiping .swipe-line { width: 100%; }

/* Peek item (tamamlananların alttan görünmesi) */
.peek-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 10px;
  background: var(--item-done-bg);
  border: 0.5px solid var(--border);
  opacity: 0.3;
  margin-top: 4px;
  flex-shrink: 0;
}
.peek-name {
  font-size: 12px;
  color: var(--text-done);
  text-decoration: line-through;
}

/* ═══════════════════════════════════════
   TAKVİM MODAL
═══════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal-sheet {
  width: 100%;
  max-width: 430px;
  background: var(--modal-bg);
  border-radius: 24px 24px 0 0;
  padding: 20px;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  border: 0.5px solid var(--border);
  border-bottom: none;
  max-height: 85vh;
  overflow-y: auto;
}
.modal-overlay.open .modal-sheet {
  transform: translateY(0);
}
.modal-handle {
  width: 36px;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  margin: 0 auto 16px;
}

/* ═══════════════════════════════════════
   KAYDIRMALI SAAT PİCKER
═══════════════════════════════════════ */
.time-picker-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin: 4px 0 16px;
  position: relative;
}
.time-picker-wrap .sep {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 2px;
}
.drum {
  width: 72px;
  height: 140px;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  border-radius: 16px;
  background: var(--input-bg);
  border: 0.5px solid var(--input-border);
  position: relative;
}
.drum::-webkit-scrollbar { display: none; }
.drum-item {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  scroll-snap-align: center;
  font-size: 22px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.02em;
  font-variant-numeric: tabular-nums;
  transition: color 0.15s, font-size 0.15s;
  cursor: pointer;
}
.drum-item.selected {
  color: var(--accent);
  font-size: 26px;
}
/* Drum üst/alt boşluk için phantom item */
.drum-item.phantom {
  pointer-events: none;
}
/* Seçim çizgileri */
.drum::before,
.drum::after {
  content: '';
  position: sticky;
  display: block;
  left: 0; right: 0;
  height: 1px;
  background: var(--accent);
  opacity: 0.35;
  z-index: 2;
}
.drum::before { top: 48px; }
.drum::after  { top: 91px; }
.time-picker-label {
  font-size: 11px;
  color: var(--text-secondary);
  text-align: center;
  margin-bottom: 4px;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.time-picker-col {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.time-picker-section {
  margin-bottom: 12px;
}
.time-picker-section-title {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.time-toggle-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.time-toggle-btn {
  flex: 1;
  padding: 10px;
  border-radius: 12px;
  background: var(--input-bg);
  border: 0.5px solid var(--input-border);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.time-toggle-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 700;
}
.modal-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 16px;
}

/* Takvim */
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.cal-month {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
}
.cal-nav {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--item-bg);
  border: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-primary);
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-day-name {
  text-align: center;
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 500;
  padding: 4px 0;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.15s;
}
.cal-day:hover { background: var(--item-bg); }
.cal-day.today { background: var(--accent-dim); color: var(--accent); }
.cal-day.selected { background: var(--accent); color: var(--bg); font-weight: 700; }
.cal-day.empty { pointer-events: none; }
.cal-day.has-task::after {
  content: '';
  position: absolute;
  bottom: 3px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
}
.cal-day { position: relative; }

/* Form elemanları */
.form-group { margin-bottom: 14px; }
.form-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 6px;
  display: block;
  font-weight: 500;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.form-input {
  width: 100%;
  padding: 10px 12px;
  border-radius: 12px;
  background: var(--input-bg);
  border: 0.5px solid var(--input-border);
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--accent); }
.time-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.btn-primary {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  background: var(--accent);
  color: var(--bg);
  font-size: 15px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  font-family: inherit;
  margin-top: 4px;
  transition: opacity 0.15s;
}
.btn-primary:active { opacity: 0.8; }
.btn-secondary {
  width: 100%;
  padding: 11px;
  border-radius: 14px;
  background: transparent;
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  border: 0.5px solid var(--border);
  cursor: pointer;
  font-family: inherit;
  margin-top: 8px;
  transition: opacity 0.15s;
}
.btn-secondary:active { opacity: 0.6; }

/* Tema seçici */
.theme-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 8px;
}
.theme-option {
  border-radius: 14px;
  padding: 12px 8px;
  border: 1.5px solid transparent;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.theme-option.active { border-color: var(--accent); }
.theme-swatch {
  width: 100%;
  height: 36px;
  border-radius: 8px;
  margin-bottom: 6px;
}
.theme-name {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
}

/* Detay modal */
.detail-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}
.btn-danger {
  flex: 1;
  padding: 11px;
  border-radius: 14px;
  background: transparent;
  color: #e05555;
  font-size: 14px;
  font-weight: 500;
  border: 0.5px solid rgba(224,85,85,0.3);
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.15s;
}
.detail-info {
  background: var(--item-bg);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
}
.detail-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 0.5px solid var(--divider);
}

<script>
// ═══════════════════════════════════════
// VERİ
// ═══════════════════════════════════════
const DAYS_TR = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const DAYS_SHORT = ['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
const MONTHS_TR = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

// Haftalık rutin şablonu (0=Pazar...6=Cumartesi)
let routineTemplates = JSON.parse(localStorage.getItem('routineTemplates') || 'null') || {
  0: [], 1: [
    {id:'r1', name:'Sabah rutini', timeStart:'07:00', timeEnd:'07:30'},
    {id:'r2', name:'Egzersiz', timeStart:'08:00', timeEnd:'09:00'},
  ], 2: [
    {id:'r3', name:'Sabah rutini', timeStart:'07:00', timeEnd:'07:30'},
  ], 3: [
    {id:'r4', name:'Sabah rutini', timeStart:'07:00', timeEnd:'07:30'},
    {id:'r5', name:'Egzersiz', timeStart:'08:00', timeEnd:'09:00'},
  ], 4: [
    {id:'r6', name:'Sabah rutini', timeStart:'07:00', timeEnd:'07:30'},
  ], 5: [
    {id:'r7', name:'Sabah rutini', timeStart:'07:00', timeEnd:'07:30'},
    {id:'r8', name:'Egzersiz', timeStart:'08:00', timeEnd:'09:00'},
  ], 6: []
};

// Günlük tamamlanma durumu: { 'YYYY-MM-DD': { routineId: true, ... } }
let completions = JSON.parse(localStorage.getItem('completions') || '{}');

// Özel görevler: { 'YYYY-MM-DD': [{id, name, timeStart, timeEnd, note, done}] }
let specialTasks = JSON.parse(localStorage.getItem('specialTasks') || '{}');

// Tema
let currentTheme = localStorage.getItem('theme') || 'siyah-gri';
document.documentElement.setAttribute('data-theme', currentTheme === 'default' ? '' : currentTheme);

const themes = [
  { id: 'default', name: 'Siyah\nTuruncu', bg: '#111110', accent: '#e8823a' },
  { id: 'siyah-gri', name: 'Siyah\nGri', bg: '#0a0a0a', accent: '#bbbbbb' },
  { id: 'siyah-sari', name: 'Siyah\nSarı', bg: '#0d0d0d', accent: '#f5d020' },
  { id: 'acik-krem', name: 'Açık\nKrem', bg: '#f5f0e8', accent: '#5a5040' },
  { id: 'gri-beyaz', name: 'Gri\nBeyaz', bg: '#e8e8e8', accent: '#444444' },
  { id: 'lacivert-cyan', name: 'Lacivert\nCyan', bg: '#0b0f1a', accent: '#4fc3f7' },
];

// Aktif gün indeksi (merkez = bugün)
const today = new Date();
today.setHours(0,0,0,0);
let activeDayOffset = 0; // bugünden fark (gün sayısı)
const WINDOW = 30; // her yönde 30 gün

function getDateByOffset(offset) {
  const d = new Date(today);
  d.setDate(d.getDate() + offset);
  return d;
}
function dateKey(date) {
  return date.toISOString().split('T')[0];
}
// saveData is defined later with cloud sync support

// ═══════════════════════════════════════
// KART RENDER
// ═══════════════════════════════════════
function buildCard(offset) {
  const date = getDateByOffset(offset);
  const key = dateKey(date);
  const dow = date.getDay();

  const card = document.createElement('div');
  card.className = 'day-card';
  card.dataset.offset = offset;

  // Rutinler
  const routines = routineTemplates[dow] || [];
  const comp = completions[key] || {};
  const tasks = specialTasks[key] || [];

  // Sırala: saatli önce, saatsiz sona
  const sortItems = (items, isDone) => {
    return [...items].sort((a,b) => {
      if (a.timeStart && b.timeStart) return a.timeStart.localeCompare(b.timeStart);
      if (a.timeStart) return -1;
      if (b.timeStart) return 1;
      return 0;
    });
  };

  // --- RUTİN YARISI ---
  const rHalf = document.createElement('div');
  rHalf.className = 'card-half';

  const rHeader = document.createElement('div');
  rHeader.className = 'half-header';
  rHeader.innerHTML = `<span class="half-title">Rutinler</span>`;
  const rAddBtn = document.createElement('div');
  rAddBtn.className = 'add-btn';
  rAddBtn.textContent = '+';
  rAddBtn.addEventListener('click', () => openEditRoutineModal(dow));
  rHeader.appendChild(rAddBtn);
  rHalf.appendChild(rHeader);

  const rScroll = document.createElement('div');
  rScroll.className = 'items-scroll';

  const pendingRoutines = sortItems(routines.filter(r => !comp[r.id]));
  const doneRoutines = sortItems(routines.filter(r => comp[r.id]));

  pendingRoutines.forEach(r => {
    rScroll.appendChild(makeTaskEl(r, false, 'routine', key, offset));
  });

  if (doneRoutines.length > 0) {
    // Tamamlananlar listenin altında soluk görünsün
    doneRoutines.forEach(r => {
      rScroll.appendChild(makeTaskEl(r, true, 'routine', key, offset));
    });
  }

  if (routines.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `<span class="empty-state-text">Bu gün için rutin yok</span>`;
    rScroll.appendChild(empty);
  }

  rHalf.appendChild(rScroll);

  // --- GÖREV YARISI ---
  const tHalf = document.createElement('div');
  tHalf.className = 'card-half';

  const tHeader = document.createElement('div');
  tHeader.className = 'half-header';
  tHeader.innerHTML = `<span class="half-title">Görevler</span>`;
  const tAddBtn = document.createElement('div');
  tAddBtn.className = 'add-btn';
  tAddBtn.textContent = '+';
  tAddBtn.addEventListener('click', () => openAddTaskModal(key));
  tHeader.appendChild(tAddBtn);
  tHalf.appendChild(tHeader);

  const tScroll = document.createElement('div');
  tScroll.className = 'items-scroll';

  const pendingTasks = sortItems(tasks.filter(t => !t.done));
  const doneTasks = sortItems(tasks.filter(t => t.done));

  pendingTasks.forEach(t => {
    tScroll.appendChild(makeTaskEl(t, false, 'task', key, offset));
  });
  doneTasks.forEach(t => {
    tScroll.appendChild(makeTaskEl(t, true, 'task', key, offset));
  });

  if (tasks.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `<span class="empty-state-text">Bu gün için özel görev yok</span>`;
    tScroll.appendChild(empty);
  }

  tHalf.appendChild(tScroll);

  card.appendChild(rHalf);
  card.appendChild(tHalf);
  return card;
}

function makeTaskEl(item, isDone, type, dateKey, offset) {
  const el = document.createElement('div');
  el.className = 'task-item' + (isDone ? ' done' : '');
  el.dataset.id = item.id;
  el.dataset.type = type;

  let timeHtml = '';
  if (item.timeStart) {
    const t = item.timeEnd ? `${item.timeStart} – ${item.timeEnd}` : item.timeStart;
    timeHtml = `<span class="task-time">${t}</span>`;
  }

  el.innerHTML = `
    ${timeHtml}
    <span class="task-name">${item.name}</span>
    <div class="task-detail-btn">···</div>
    <div class="swipe-line"></div>
  `;

  // Detay butonu
  el.querySelector('.task-detail-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    openDetailModal(item, type, dateKey, isDone);
  });

  // Swipe to complete
  let startX = 0, startY = 0, swiping = false;
  el.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    swiping = false;
  }, {passive: true});
  el.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) && dx > 20) {
      swiping = true;
      el.classList.add('swiping');
      e.stopPropagation();
    }
  }, {passive: true});
  el.addEventListener('touchend', e => {
    if (swiping) {
      e.stopPropagation();
      el.classList.remove('swiping');
      toggleDone(item, type, dateKey, offset);
    }
    swiping = false;
  });

  // Click to complete (masaüstü)
  el.addEventListener('click', (e) => {
    if (e.target.classList.contains('task-detail-btn')) return;
    toggleDone(item, type, dateKey, offset);
  });

  return el;
}

function toggleDone(item, type, dateKey, offset) {
  if (type === 'routine') {
    if (!completions[dateKey]) completions[dateKey] = {};
    if (completions[dateKey][item.id]) {
      delete completions[dateKey][item.id];
    } else {
      completions[dateKey][item.id] = true;
    }
  } else {
    const tasks = specialTasks[dateKey] || [];
    const t = tasks.find(t => t.id === item.id);
    if (t) t.done = !t.done;
    specialTasks[dateKey] = tasks;
  }
  saveData();
  refreshCard(offset);
}

function refreshCard(offset) {
  const track = document.getElementById('cards-track');
  const existing = track.querySelector(`[data-offset="${offset}"]`);
  if (existing) {
    const wasActive = existing.classList.contains('active-card');
    const newCard = buildCard(offset);
    if (wasActive) newCard.classList.add('active-card');
    track.replaceChild(newCard, existing);
  }
  updateDayNav();
}

// TRACK & SWIPE
// ═══════════════════════════════════════
function initTrack() {
  const track = document.getElementById('cards-track');
  track.innerHTML = '';
  for (let i = -WINDOW; i <= WINDOW; i++) {
    track.appendChild(buildCard(i));
  }
  setTrackOffset(activeDayOffset, false);
}

function getCardWidth() {
  const wrapper = document.getElementById('cards-wrapper');
  return wrapper.offsetWidth - 64 + 16; // kart genişliği: wrapper - peek padding + margins
}

function setTrackOffset(offset, animate = true) {
  const track = document.getElementById('cards-track');
  const idx = offset + WINDOW;
  const cardW = getCardWidth();
  // Kartları ortala: sol peek 24px
  const translateX = -(idx * cardW) + 24;
  if (!animate) track.style.transition = 'none';
  track.style.transform = `translateX(${translateX}px)`;
  if (!animate) setTimeout(() => { track.style.transition = ''; }, 50);

  // Aktif kart vurgusu
  track.querySelectorAll('.day-card').forEach((c, i) => {
    if (i === idx) c.classList.add('active-card');
    else c.classList.remove('active-card');
  });
}

function goToOffset(offset) {
  activeDayOffset = offset;
  setTrackOffset(offset);
  updateHeader();
  updateDayNav();
}

// Touch swipe
let touchStartX = 0, touchStartY = 0, isDragging = false;
const wrapper = document.getElementById('cards-wrapper');

wrapper.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isDragging = false;
}, {passive: true});

wrapper.addEventListener('touchmove', e => {
  if (e.target.closest('.task-item')) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (!isDragging && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) {
    isDragging = true;
  }
}, {passive: true});

wrapper.addEventListener('touchend', e => {
  if (!isDragging) return;
  if (e.target.closest('.task-item')) { isDragging = false; return; }
  const dx = e.changedTouches[0].clientX - touchStartX;
  const threshold = getCardWidth() * 0.25;
  if (Math.abs(dx) > threshold) {
    const newOffset = activeDayOffset + (dx < 0 ? 1 : -1);
    if (newOffset >= -WINDOW && newOffset <= WINDOW) goToOffset(newOffset);
  }
  isDragging = false;
});

function updateDayNav() {

let calViewYear = today.getFullYear();
let calViewMonth = today.getMonth();

document.getElementById('cal-btn').addEventListener('click', () => {
  calViewYear = today.getFullYear();
  calViewMonth = today.getMonth();
  renderCal();
  openModal('cal-modal');
});
document.getElementById('cal-prev').addEventListener('click', () => {
  calViewMonth--;
  if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
  renderCal();
});
document.getElementById('cal-next').addEventListener('click', () => {
  calViewMonth++;
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  renderCal();
});

function renderCal() {
  document.getElementById('cal-month-label').textContent =
    `${MONTHS_TR[calViewMonth]} ${calViewYear}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const dayNames = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
  dayNames.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-name';
    el.textContent = d;
    grid.appendChild(el);
  });
  const first = new Date(calViewYear, calViewMonth, 1);
  let startDow = first.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1; // Mon=0
  for (let i = 0; i < startDow; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }
  const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;
    const thisDate = new Date(calViewYear, calViewMonth, d);
    thisDate.setHours(0,0,0,0);
    const key = dateKey(thisDate);
    const diff = Math.round((thisDate - today) / 86400000);
    if (thisDate.getTime() === today.getTime()) el.classList.add('today');
    if (diff === activeDayOffset) el.classList.add('selected');
    if (specialTasks[key] && specialTasks[key].length > 0) el.classList.add('has-task');
    el.addEventListener('click', () => {
      if (diff >= -WINDOW && diff <= WINDOW) {
        goToOffset(diff);
        closeModal('cal-modal');
      }
    });
    grid.appendChild(el);
  }
}

// ═══════════════════════════════════════
function buildDrum(drumEl, items, defaultVal) {
  drumEl.innerHTML = '';
  // Üst phantom
  const topPhantom = document.createElement('div');
  topPhantom.className = 'drum-item phantom';
  topPhantom.style.height = '48px';
  drumEl.appendChild(topPhantom);

  items.forEach(val => {
    const item = document.createElement('div');
    item.className = 'drum-item';
    item.textContent = val;
    item.dataset.val = val;
    drumEl.appendChild(item);
  });

  // Alt phantom
  const botPhantom = document.createElement('div');
  botPhantom.className = 'drum-item phantom';
  botPhantom.style.height = '48px';
  drumEl.appendChild(botPhantom);

  // Scroll listener
  let scrollTimer;
  drumEl.addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => snapDrum(drumEl), 80);
  }, {passive: true});

  // Başlangıç değeri
  const idx = items.indexOf(defaultVal);
  if (idx >= 0) {
    setTimeout(() => {
      drumEl.scrollTop = idx * 44;
      highlightDrum(drumEl);
    }, 50);
  }
}

function snapDrum(drumEl) {
  const idx = Math.round(drumEl.scrollTop / 44);
  drumEl.scrollTo({top: idx * 44, behavior: 'smooth'});
  setTimeout(() => highlightDrum(drumEl), 120);
}

function highlightDrum(drumEl) {
  const idx = Math.round(drumEl.scrollTop / 44);
  drumEl.querySelectorAll('.drum-item:not(.phantom)').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
}

function getDrumVal(drumEl) {
  const idx = Math.round(drumEl.scrollTop / 44);
  const items = drumEl.querySelectorAll('.drum-item:not(.phantom)');
  return items[idx] ? items[idx].dataset.val : '00';
}

const HOURS = Array.from({length:24}, (_,i) => String(i).padStart(2,'0'));
const MINS  = Array.from({length:60}, (_,i) => String(i).padStart(2,'0'));

function initDrums(prefix, defaultH='08', defaultM='00', defaultEH='09', defaultEM='00') {
  buildDrum(document.getElementById(prefix+'-hour-drum'), HOURS, defaultH);
  buildDrum(document.getElementById(prefix+'-min-drum'),  MINS,  defaultM);
  if (document.getElementById(prefix+'-hour-end-drum')) {
    buildDrum(document.getElementById(prefix+'-hour-end-drum'), HOURS, defaultEH);
    buildDrum(document.getElementById(prefix+'-min-end-drum'),  MINS,  defaultEM);
  }
}

function getPickerTime(prefix) {
  const h = getDrumVal(document.getElementById(prefix+'-hour-drum'));
  const m = getDrumVal(document.getElementById(prefix+'-min-drum'));
  return h + ':' + m;
}
function getPickerEndTime(prefix) {
  const el = document.getElementById(prefix+'-hour-end-drum');
  if (!el) return '';
  const h = getDrumVal(el);
  const m = getDrumVal(document.getElementById(prefix+'-min-end-drum'));
  return h + ':' + m;
}

let auth, db;
window.addEventListener('load', function() {
  try {
    firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    db = firebase.firestore();
    console.log('Firebase OK');

    // Google redirect sonucunu yakala (mobil için)
    auth.getRedirectResult().then(result => {
      if (result && result.user) {
        console.log('Google redirect login OK');
      }
    }).catch(e => {
      if (e.code && e.code !== 'auth/no-current-user' && e.code !== 'auth/null-user') {
        console.error('Redirect error:', e);
        showAuthError('Google girişi başarısız: ' + e.message);
      }
    });

    // Auth state listener'ı burada başlat
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('user-email').textContent = user.email ? user.email.split('@')[0] : (user.displayName || 'Kullanıcı');
        await loadUserData();
        updateHeader();
        updateDayNav();
        initTrack();
      } else {
        currentUser = null;
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('user-email').textContent = '...';
        setAuthLoading(false);
      }
    });
  } catch(e) {
    console.error('Firebase init hatası:', e);
    document.getElementById('auth-error').textContent = 'Bağlantı hatası. Sayfayı yenileyin.';
    document.getElementById('auth-error').classList.add('show');
  }
});

let currentUser = null;

// ═══════════════════════════════════════
// AUTH FONKSİYONLARI
// ═══════════════════════════════════════
let authMode = 'login';

function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById('login-tab').classList.toggle('active', mode === 'login');
  document.getElementById('register-tab').classList.toggle('active', mode === 'register');
  document.getElementById('auth-password2').style.display = mode === 'register' ? 'block' : 'none';
  document.getElementById('forgot-btn').style.display = mode === 'login' ? 'block' : 'none';
  document.getElementById('auth-submit-btn').textContent = mode === 'login' ? 'Giriş Yap' : 'Kayıt Ol';
  hideAuthError();
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.add('show');
}
function hideAuthError() {
  document.getElementById('auth-error').classList.remove('show');
}
function setAuthLoading(show) {
  document.getElementById('auth-loading').classList.toggle('show', show);
  document.getElementById('auth-submit-btn').style.display = show ? 'none' : 'block';
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const password2 = document.getElementById('auth-password2').value;
  hideAuthError();

  if (!email || !password) { showAuthError('E-posta ve şifre gerekli.'); return; }
  if (authMode === 'register') {
    if (password.length < 6) { showAuthError('Şifre en az 6 karakter olmalı.'); return; }
    if (password !== password2) { showAuthError('Şifreler eşleşmiyor.'); return; }
  }

  setAuthLoading(true);
  try {
    if (authMode === 'login') {
      await auth.signInWithEmailAndPassword(email, password);
    } else {
      await auth.createUserWithEmailAndPassword(email, password);
    }
  } catch(e) {
    setAuthLoading(false);
    const msgs = {
      'auth/user-not-found': 'Bu e-posta ile kayıtlı hesap yok.',
      'auth/wrong-password': 'Şifre yanlış.',
      'auth/email-already-in-use': 'Bu e-posta zaten kayıtlı.',
      'auth/invalid-email': 'Geçersiz e-posta adresi.',
      'auth/too-many-requests': 'Çok fazla deneme. Lütfen bekle.',
      'auth/invalid-credential': 'E-posta veya şifre hatalı.',
    };
    showAuthError(msgs[e.code] || 'Bir hata oluştu: ' + e.message);
  }
}


async function handleGoogleAuth() {
  hideAuthError();
  setAuthLoading(true);
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    // Mobilde redirect, masaüstünde popup dene
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (isMobile) {
      await auth.signInWithRedirect(provider);
    } else {
      await auth.signInWithPopup(provider);
    }
  } catch(e) {
    setAuthLoading(false);
    const msgs = {
      'auth/popup-closed-by-user': 'Giriş penceresi kapatıldı.',
      'auth/popup-blocked': 'Açılır pencere engellendi. Tarayıcı ayarlarını kontrol edin.',
      'auth/cancelled-popup-request': '',
      'auth/network-request-failed': 'Ağ bağlantısı hatası.',
    };
    const msg = msgs[e.code];
    if (msg !== '') showAuthError(msg || 'Google girişi başarısız: ' + e.message);
  }
}

// Google redirect sonucu window.onload içinde yakalanıyor

function handleGuestMode() {
  // Misafir mod: Firebase olmadan sadece localStorage ile çalış
  currentUser = null;
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('user-email').textContent = 'Misafir';
  updateHeader();
  updateDayNav();
  initTrack();
}

async function forgotPassword() {
  const email = document.getElementById('auth-email').value.trim();
  if (!email) { showAuthError('Önce e-posta adresini gir.'); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    showAuthError('Şifre sıfırlama e-postası gönderildi!');
    document.getElementById('auth-error').style.color = '#4fc3f7';
  } catch(e) {
    showAuthError('E-posta gönderilemedi.');
  }
}

function openUserModal() {
  document.getElementById('user-info-email').textContent = currentUser ? currentUser.email : 'Misafir (veriler sadece bu cihazda)';
  openModal('user-modal');
}

function handleLogout() {
  if (currentUser) {
    auth.signOut();
  } else {
    // Misafir mod: auth ekranına dön
    document.getElementById('auth-screen').classList.remove('hidden');
  }
  closeModal('user-modal');
}

// Auth state - window.onload içinde

// Enter tuşu ile giriş
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !document.getElementById('auth-screen').classList.contains('hidden')) {
    handleAuth();
  }
});

// ═══════════════════════════════════════
// BULUT VERİ YÜKLEME / KAYDETME
// ═══════════════════════════════════════
async function loadUserData() {
  if (!currentUser) return;
  try {
    const doc = await db.collection('users').doc(currentUser.uid).get();
    if (doc.exists) {
      const data = doc.data();
      if (data.routineTemplates) routineTemplates = data.routineTemplates;
      if (data.completions) completions = data.completions;
      if (data.specialTasks) specialTasks = data.specialTasks;
      if (data.theme) {
        currentTheme = data.theme;
        localStorage.setItem('theme', data.theme);
        document.documentElement.setAttribute('data-theme', data.theme === 'default' ? '' : data.theme);
      }
    }
  } catch(e) {
    console.log('Veri yüklenemedi:', e);
  }
}

let saveTimer = null;
async function saveData() {
  // Yerel depolama
  localStorage.setItem('routineTemplates', JSON.stringify(routineTemplates));
  localStorage.setItem('completions', JSON.stringify(completions));
  localStorage.setItem('specialTasks', JSON.stringify(specialTasks));
  // Bulut kayıt (debounce - 1.5 saniye bekle)
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    if (!currentUser) return;
    try {
      await db.collection('users').doc(currentUser.uid).set({
        routineTemplates,
        completions,
        specialTasks,
        theme: currentTheme,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch(e) {
      console.log('Bulut kayıt hatası:', e);
    }
  }, 1500);
}
